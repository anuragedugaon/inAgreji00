name: inangreji_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"  # compatible with Flutter 3.35.x

dependencies:
  flutter:
    sdk: flutter
  table_calendar: ^3.0.9
  flutter_sound: ^9.2.13
  audio_session: ^0.1.23
  fl_chart: ^1.1.1
  syncfusion_flutter_gauges: ^31.2.2
  percent_indicator: ^4.2.3
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.3.0
  http: ^1.5.0
  lottie: ^3.3.2            # for Lottie animations
  just_audio: ^0.10.5       # audio playback
  flutter_tts: ^4.2.3       # simple TTS option
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.3
  provider: ^6.1.5+1
  google_fonts: ^6.3.2
  flutter_localizations:
    sdk: flutter
  video_player: ^2.10.1
  razorpay_flutter: ^1.4.0
  confetti: ^0.8.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  dio: ^5.9.0
  change_app_package_name: ^1.5.0
  # firebase_core: ^4.3.0
  # firebase_messaging: ^16.1.0
  # flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # EITHER include the whole images folder (recommended)…
  assets:
    - assets/animations/teacher_idle.json
    - assets/animations/teacher_speaking.json
    - assets/animations/kid_study.json
    - assets/animations/human_ani.json
    - assets/mouth/
    - assets/images/
    - assets/video/
    - lib/l10n/en.json
    - lib/l10n/hi.json
    - lib/l10n/bn.json
    - lib/l10n/

